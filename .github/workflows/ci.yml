name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 10.10.0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - name: Build native installer
        run: node scripts/build-ci.mjs
        env:
          DEWEY_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          DEWEY_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          DEWEY_WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          DEWEY_WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          DEWEY_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          DEWEY_APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          DEWEY_APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          DEWEY_APPLE_ID: ${{ secrets.APPLE_ID }}
          DEWEY_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          DEWEY_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Upload native installer
        uses: actions/upload-artifact@v7
        with:
          name: Dewey-${{ runner.os }}-${{ runner.arch }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*-mac.zip
            release/*.exe
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
